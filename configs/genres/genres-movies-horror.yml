templates:
  Genre:
    optional:
      - label
      - summary
    smart_filter:
      all:
        genre: <<genre>>
      sort_by: random
    label: <<label>>
    sort_title: '!3_Genre <<collection_name>>'
    summary: <<summary>>
  'Genre [Bottom]':
    optional:
      - label
      - summary
    smart_filter:
      all:
        genre: <<genre>>
      sort_by: random
    label: <<label>>
    sort_title: '!3_Genre <<collection_name>>'
    summary: <<summary>>
  'Genre [Bottom] - Custom':
    optional:
      - label
      - summary
    label: <<label>>
    sort_title: '!3_Genre <<collection_name>>'
    summary: <<summary>>
  Genre - Trakt List:
    optional:
      - label
      - summary
    trakt_list: 'https://trakt.tv/users/goape/lists/<<list>>'
    sync_mode: sync
    label: <<label>>
    smart_label: random
    sort_title: '!3_Genre <<collection_name>>'
    summary: <<summary>>
  Genre - Trakt List Other:
    optional:
      - label
      - summary
    trakt_list: <<list>>
    sync_mode: sync
    label: <<label>>
    smart_label: random
    sort_title: '!3_Genre <<collection_name>>'
    summary: <<summary>>
  'Genre [Bottom] - Trakt List':
    optional:
      - label
      - summary
    trakt_list: 'https://trakt.tv/users/goape/lists/<<list>>'
    sync_mode: sync
    label: <<label>>
    smart_label: random
    sort_title: '!3_Genre <<collection_name>>'
    summary: <<summary>>
  'Genre [Bottom] - Trakt Lists':
    optional:
      - label
      - summary
    trakt_list: <<list>>
    sync_mode: sync
    label: <<label>>
    smart_label: random
    sort_title: '!3_Genre <<collection_name>>'
    summary: <<summary>>
  'Genre [Holiday] - Trakt List':
    optional:
      - label
      - summary
    trakt_list: 'https://trakt.tv/users/goape/lists/<<list>>'
    sync_mode: sync
    label: <<label>>
    smart_label: title.asc
    sort_title: '!3_Genre_Holiday <<collection_name>>'
